<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Note ✦ Girly Retro Aesthetic</title>

<style>
/* 1. استيراد خط البيكسل العتيق */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  box-sizing:border-box;
  margin: 0;
  padding: 0;
}

body{
  /* 2. الخلفية الوردية ذات القلوب (محاكاة بالـ CSS) */
  background-color: #ffe1f2;
  background-image:
    radial-gradient(#ffffff 15%, transparent 15%),
    radial-gradient(#ffffff 15%, transparent 15%);
  background-position: 0 0, 15px 15px;
  background-size: 30px 30px;
  
  font-family: 'Press Start 2P', cursive;
  overflow-x: hidden;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 3. الإطار الخارجي المزخرف (تأثير الصورة) */
.page-frame {
  position: fixed;
  inset: 0;
  pointer-events: none; /* لا يتداخل مع الضغط */
  z-index: 100;
}

/* زخارف الإطار (الأهلّة والفيونكات) */
.page-frame::before, .page-frame::after {
  content: "🎀 🎀 🎀 🎀 🎀";
  position: absolute;
  color: #ff3399;
  font-size: 14px;
  text-align: center;
  width: 100%;
}
.page-frame::before { top: 10px; }
.page-frame::after { bottom: 10px; }

.frame-corner {
  position: absolute;
  font-size: 20px;
  color: #ff3399;
}
.top-left { top: 10px; left: 10px; }
.top-right { top: 10px; right: 10px; }
.bottom-left { bottom: 10px; left: 10px; }
.bottom-right { bottom: 10px; right: 10px; }

/* 4. الحاوية المركزية المحتوى */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  position: relative;
  z-index: 10;
}

/* 5. منطقة العنوان (الرموز والشعار) */
.header-area {
  text-align: center;
  position: relative;
}

.title-icons {
  font-size: 16px;
  margin-bottom: 10px;
}

/* محاكاة شريط العنوان الورد */
.title-banner {
  background: white;
  border: 4px solid #cc0066;
  border-radius: 8px;
  padding: 15px 30px;
  box-shadow: 0 4px 0 #ff99cc, 6px 6px 0 rgba(0,0,0,0.2);
  display: inline-block;
  position: relative;
  margin-bottom: 15px;
}

/* تأثير الشريط الخلفي المسنن */
.title-banner::after {
  content: "";
  position: absolute;
  inset: -15px -10px;
  background: linear-gradient(135deg, #ff99cc 25%, transparent 25%) -10px 0,
              linear-gradient(225deg, #ff99cc 25%, transparent 25%) -10px 0,
              linear-gradient(315deg, #ff99cc 25%, transparent 25%),
              linear-gradient(45deg, #ff99cc 25%, transparent 25%);
  background-size: 20px 20px;
  z-index: -1;
  border-radius: 4px;
}

.main-title {
  font-size: 20px;
  color: #ff3399;
  text-shadow: 2px 2px 0 #ffccff, 4px 4px 0 rgba(0,0,0,0.1);
}

.sub-header {
  color: #800060;
  font-size: 8px;
  background: white;
  display: inline-block;
  padding: 6px;
  border-radius: 4px;
}

/* الزخارف الجانبية للعنوان */
.title-ornament {
  position: absolute;
  font-size: 16px;
}
.cherry-left { top: 50px; left: -40px; }
.cherry-right { top: 50px; right: -40px; }
.ribbon-left { bottom: 0; left: -50px; }
.ribbon-right { bottom: 0; right: -50px; }

/* 6. نافذة المفكرة (الجدول) */
.notebook-window {
  width: 90%;
  max-width: 500px;
  background: #fdf2ff; /* بنفسجي فاتح جداً */
  border: 4px solid #cc33cc;
  border-radius: 12px;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.15);
  overflow: hidden;
  position: relative;
}

/* شريط التحكم العلوي للمفكرة */
.notebook-control {
  background: white;
  border-bottom: 4px solid #cc33cc;
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #cc33cc;
}

.control-buttons {
  display: flex;
  gap: 8px;
}

.control-btn {
  font-size: 10px;
}

.notebook-title {
  color: #990099;
  font-size: 9px;
  text-shadow: 1px 1px 0 #ffccff;
}

/* 7. شبكة الأمثلة بداخل المفكرة */
.notes-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

/* صندوق مثال فردي */
.example-box {
  background: white;
  border: 3px solid #cc33cc;
  border-radius: 8px;
  padding: 10px;
  height: 140px; /* ارتفاع ثابت للمحاكاة */
}

.example-header {
  color: #990099;
  font-size: 8px;
  border-bottom: 2px solid #cc33cc;
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.example-content {
  color: #400030;
  font-size: 7px;
  line-height: 1.6;
}

</style>
</head>

<body>

  <!-- الإطار الخارجي المزخرف -->
  <div class="page-frame">
    <div class="frame-corner top-left">🌙</div>
    <div class="frame-corner top-right">🌙</div>
    <div class="frame-corner bottom-left">🌙</div>
    <div class="frame-corner bottom-right">🌙</div>
  </div>

  <!-- الحاوية المركزية -->
  <div class="container">
    
    <!-- منطقة العنوان -->
    <div class="header-area">
      <!-- الزخارف الجانبية -->
      <div class="title-ornament cherry-left">🍒</div>
      <div class="title-ornament cherry-right">🍒</div>
      <div class="title-ornament ribbon-left">🎀</div>
      <div class="title-ornament ribbon-right">🎀</div>

      <div class="title-icons">
        ✨ 🐱 ⭐
      </div>
      
      <div class="title-banner">
        <h1 class="main-title">PIXEL NOTE</h1>
      </div>
      
      <div class="sub-header">
        ✨ write with retro style ✨
      </div>
    </div>

    <!-- نافذة المفكرة -->
    <div class="notebook-window">
      <!-- شريط التحكم -->
      <div class="notebook-control">
        <div class="control-buttons">
          <span class="control-btn">✦</span>
          <span class="control-btn">⭐</span>
        </div>
        <div class="notebook-title">✦ CUTE NOTES AWAIT! ✦</div>
        <div class="control-buttons">
          <span class="control-btn">✦</span>
          <span class="control-btn">X</span>
        </div>
      </div>
      
      <!-- شبكة الأمثلة -->
      <div class="notes-grid">
        
        <!-- مثال 1: Daily Task -->
        <div class="example-box">
          <div class="example-header">DAILY TASK:</div>
          <div class="example-content">
            🚀 I did my job today.<br>
            (Time to relax!)
          </div>
        </div>
        
        <!-- مثال 2: Idea -->
        <div class="example-box">
          <div class="example-header">IDEA:</div>
          <div class="example-content">
            🎮 Gaming Night<br>
            (retro games!)
          </div>
        </div>
        
        <!-- مثال 3: Love -->
        <div class="example-box">
          <div class="example-header">LOVE:</div>
          <div class="example-content">
            💖 Grocery List<br>
            (Strawberries)
          </div>
        </div>
        
        <!-- مثال 4: فارغ (محاكاة للخلايا الفارغة) -->
        <div class="example-box" style="visibility: hidden;">
        </div>
        
      </div>
    </div>

  </div>

</body>
</html>
