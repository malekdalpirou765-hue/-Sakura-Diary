<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Note ✦</title>

<style>
/* 1. استيراد خط البيكسل */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  box-sizing:border-box;
  margin: 0;
  padding: 0;
}

body{
  /* 2. خلفية القلوب الوردية المحاكاة بـ CSS */
  background-color: #ffe1f2;
  background-image:
    radial-gradient(#ffffff 20%, transparent 20%),
    radial-gradient(#ffffff 20%, transparent 20%);
  background-position: 0 0, 15px 15px;
  background-size: 30px 30px;
  
  font-family: 'Press Start 2P', cursive;
  overflow-x: hidden;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 3. حاوية العناوين والشريط */
.header-area {
  text-align: center;
  position: relative;
  margin-top: 20px;
  margin-bottom: 30px;
}

/* 4. الرموز العلوية فوق العنوان */
.icons {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 10px;
}

.icon {
  font-size: 16px;
  color: #ff3399; /* لون وردي غامق */
}

/* 5. شريط "PIXEL NOTE" */
.pixel-note-banner {
  background: white;
  border: 4px solid #000;
  padding: 15px 30px;
  display: inline-block;
  position: relative;
  box-shadow: 4px 4px 0 #000;
  margin-bottom: 20px;
}

/* زخارف شريط CSS (تأثير مسنن بسيط) */
.pixel-note-banner::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  height: 10px;
  background: white;
  border-left: 4px solid #000;
  border-right: 4px solid #000;
  border-bottom: 4px solid #000;
  background-image: linear-gradient(135deg, white 25%, transparent 25%), linear-gradient(225deg, white 25%, transparent 25%);
  background-position: 5px 0, 5px 0;
  background-size: 10px 10px;
}

.pixel-note-text {
  font-size: 20px;
  color: #ff3399;
  text-shadow: 2px 2px 0 #ffccff, 4px 4px 0 #000;
}

/* 6. عبارة "write with retro style" */
.sub-header {
  color: #800060;
  font-size: 8px;
  background: white;
  display: inline-block;
  padding: 6px;
  border-radius: 4px;
}

/* 7. حاوية دفتر الملاحظات (الجدول) */
.notebook {
  width: 90%;
  max-width: 500px;
  background: #fdf2ff; /* لون بنفسجي فاتح جداً */
  border: 4px solid #cc33cc; /* حدود بنفسجية */
  border-radius: 8px;
  box-shadow: 6px 6px 0 #990099;
  overflow: hidden;
}

/* 8. رأس دفتر الملاحظات */
.notebook-header {
  background: white;
  border-bottom: 4px solid #cc33cc;
  padding: 10px;
  text-align: center;
  color: #990099;
  font-size: 9px;
  box-shadow: inset 0 -4px 0 #ffccff;
}

/* 9. تخطيط شبكة الملاحظات */
.notes-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

/* 10. صندوق ملاحظة فردي */
.note-box {
  background: white;
  border: 3px solid #cc33cc;
  border-radius: 5px;
  padding: 10px;
  position: relative;
  height: 120px; /* ارتفاع ثابت للمحاكاة */
}

.note-box-title {
  color: #990099;
  font-size: 8px;
  border-bottom: 2px solid #cc33cc;
  padding-bottom: 5px;
  margin-bottom: 8px;
}

.note-box-content {
  color: #400030;
  font-size: 7px;
  line-height: 1.5;
}

/* 11. زخارف خارجية (الكرز، البينك...) */
.ornament {
  position: absolute;
  font-size: 16px;
}

.cherry {
  top: 50px;
  left: 20px;
  color: #ff3399;
}

.p-letter {
  bottom: 80px;
  right: 20px;
  color: #ff3399;
  font-size: 24px;
}

</style>
</head>

<body>

  <!-- الزخارف الخارجية -->
  <div class="ornament cherry">🍒</div>
  <div class="ornament p-letter">P</div>

  <!-- حاوية العنوان -->
  <div class="header-area">
    <div class="icons">
      <span class="icon">✨</span>
      <span class="icon">🐱</span>
      <span class="icon">⭐</span>
    </div>
    
    <div class="pixel-note-banner">
      <span class="pixel-note-text">PIXEL NOTE</span>
    </div>
    
    <div class="sub-header">
      ✨ write with retro style ✨
    </div>
  </div>

  <!-- حاوية دفتر الملاحظات -->
  <div class="notebook">
    <div class="notebook-header">
      ✦ CUTE NOTES AWAIT! ✦
    </div>
    
    <div class="notes-grid">
      <!-- صندوق ملاحظة 1 -->
      <div class="note-box">
        <div class="note-box-title">DAILY TASK:</div>
        <div class="note-box-content">
          🚀 I did my job today.<br>
          (Time to relax!)
        </div>
      }
      </div>
      
      <!-- صندوق ملاحظة 2 -->
      <div class="note-box">
        <div class="note-box-title">IDEA:</div>
        <div class="note-box-content">
          🎮 Gaming Night<br>
          (retro games!)
        </div>
      }
      </div>
      
      <!-- صندوق ملاحظة 3 -->
      <div class="note-box">
        <div class="note-box-title">LOVE:</div>
        <div class="note-box-content">
          💖 Grocery List<br>
          (Strawberries)
        </div>
      }
      </div>
      
      <!-- صندوق ملاحظة 4 -->
      <div class="note-box">
        <div class="note-box-title">NOTE:</div>
        <div class="note-box-content">
          ✦ You are cute!<br>
          (That's a fact!)
        </div>
      }
      </div>
      
    </div>
  </div>

</body>
</html>
