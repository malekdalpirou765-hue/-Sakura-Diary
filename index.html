<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Sakura Diary</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#ffd1e8;
  font-family:'Press Start 2P', cursive;
  color:#000;
}

.container{
  width:90%;
  max-width:500px;
  margin:auto;
  padding:20px 0;
}

.title{
  text-align:center;
  font-size:16px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
  margin-bottom:20px;
}

.card{
  background:#fff;
  border:4px solid #000;
  padding:12px;
  margin-top:15px;
  box-shadow:5px 5px 0 #000;
}

.date{
  font-size:8px;
  margin-bottom:8px;
  color:#ff2e93;
}

.text{
  font-size:9px;
  line-height:1.5;
}

textarea{
  width:100%;
  height:80px;
  border:3px solid #000;
  padding:8px;
  font-family:'Press Start 2P';
  font-size:8px;
  margin-top:15px;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#ff2e93;
  border:3px solid #000;
  color:#fff;
  font-family:'Press Start 2P';
  font-size:10px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

button:active{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 #000;
}

.entry-container{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">PIXEL DIARY ♡</div>

  <textarea id="text" placeholder="write your memory..."></textarea>

  <button onclick="addEntry()">ADD ENTRY</button>

  <div id="entries" class="entry-container"></div>

</div>

<script>
function addEntry() {
  const text = document.getElementById("text").value;

  if (!text.trim()) return;

  const container = document.getElementById("entries");

  const now = new Date();
  const date = now.toDateString();

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="date">${date}</div>
    <div class="text">${text}</div>
  `;

  container.prepend(card);

  document.getElementById("text").value = "";
}
</script>

</body>
</html>
