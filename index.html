<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Diary</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  font-family:'Press Start 2P', cursive;
  background:linear-gradient(#ffd1e8,#ffc2df);
}

.header{
  text-align:center;
  padding:18px;
  font-size:14px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
}

.container{
  width:90%;
  max-width:520px;
  margin:auto;
  padding-bottom:100px;
}

.card{
  background:#fff;
  border:4px solid #000;
  padding:10px;
  margin-top:15px;
  box-shadow:5px 5px 0 #000;
}

.date{
  font-size:8px;
  color:#ff2e93;
  margin-bottom:6px;
}

.text{
  font-size:9px;
  white-space:pre-wrap;
  margin-bottom:8px;
}

img{
  width:100%;
  border:3px solid #000;
  margin-top:6px;
}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border:3px solid #000;
  background:#ff2e93;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  width:90%;
  max-width:420px;
  background:#fff;
  border:4px solid #000;
  padding:12px;
}

textarea{
  width:100%;
  height:120px;
  border:3px solid #000;
  padding:8px;
  font-family:'Press Start 2P';
  font-size:8px;
  margin-bottom:10px;
}

input{
  width:100%;
  border:3px solid #000;
  padding:8px;
  font-size:8px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  background:#ff2e93;
  border:3px solid #000;
  color:#fff;
  font-family:'Press Start 2P';
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">PIXEL DIARY ♡</div>

<div class="container" id="entries"></div>

<button class="fab" onclick="openPopup()">+</button>

<div class="popup" id="popup">
  <div class="box">

    <textarea id="text" placeholder="write your memory..."></textarea>

    <input type="file" id="image" accept="image/*"/>

    <button onclick="addEntry()">SAVE</button>
    <button onclick="closePopup()" style="background:#000;margin-top:8px;">CANCEL</button>

  </div>
</div>

<script>
function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function addEntry(){
  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  if(!text && !file) return;

  const container = document.getElementById("entries");

  const card = document.createElement("div");
  card.className = "card";

  const date = new Date().toDateString();

  let img = "";
  if(file){
    img = `<img src="${URL.createObjectURL(file)}">`;
  }

  card.innerHTML = `
    <div class="date">${date}</div>
    <div class="text">${text}</div>
    ${img}
  `;

  container.prepend(card);

  document.getElementById("text").value = "";
  document.getElementById("image").value = "";

  closePopup();
}
</script>

</body>
</html>
