<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Note ✦ Girly Edition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Press Start 2P', cursive;
  overflow-x:hidden;
  /* GIRLY BACKGROUND STYLE */
  background-color: #ffe0f0;
  background-image: repeating-linear-gradient(45deg, #ffcde0 0px, #ffcde0 15px, #ffb3d1 15px, #ffb3d1 30px);
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
  font-size:18px;
  color:#ff4d94; /* Hot Pink */
  text-shadow:
    -3px -3px 0 #fff,  
    3px -3px 0 #fff,
    -3px 3px 0 #fff,
    3px 3px 0 #fff,
    4px 4px 0 #000; /* Black outer shadow */
}

.sub{
  text-align:center;
  font-size:9px;
  margin-bottom:15px;
  color: #800060; /* Deep Purple-Pink */
  background: #fff;
  display: inline-block;
  padding: 5px;
  border-radius: 5px;
  transform: translateX(-50%);
  left: 50%;
  position: relative;
}

/* CONTAINER */
.container{
  width:92%;
  max-width:520px;
  margin:auto;
  padding-bottom:100px;
}

/* CARD - Girly Aesthetic */
.card{
  border:4px solid #cc0066; /* Deep Pink Border */
  border-radius: 10px; /* Softer Corners */
  padding:15px;
  margin-top:18px;
  box-shadow: 6px 6px 0 #800060; /* Dark Purple Shadow */
  background:#fff;
  background-image: linear-gradient(135deg, #fffcfd, #fff0f6);
}

.title{font-size:11px;margin-bottom:8px; color: #cc0066;}
.text{font-size:10px;white-space:pre-wrap;line-height:1.6; color: #400030;}
.mood{font-size:18px;margin-bottom:8px;}

/* FAB */
.fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:70px;
  height:70px;
  border:4px solid #cc0066;
  border-radius: 50%; /* Circle FAB */
  background:#ff1493; /* Bright Hot Pink */
  color:#fff;
  font-size:32px;
  cursor:pointer;
  box-shadow:6px 6px 0 #800060;
}

/* WRITE SCREEN */
.write{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:20px;
  overflow:hidden;
  background: rgba(255, 230, 242, 0.95); /* Soft pink overlay */
}

/* INPUTS FIXED - Cute style */
input, textarea{
  width:100%;
  border:4px solid #cc0066;
  border-radius: 8px;
  padding:12px;
  font-family:'Press Start 2P';
  font-size:10px;
  margin-bottom:10px;
  background: #fff;
}

textarea{
  height:50vh;
  resize:none;
  overflow:auto;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #ff1493;
}

/* OPTIONS */
.options{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
  justify-content: center;
}

.opt{
  border:3px solid #cc0066;
  border-radius: 5px;
  padding:8px;
  font-size:8px;
  cursor:pointer;
  background:#fff;
  box-shadow: 4px 4px 0 #800060;
  color: #cc0066;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:15px;
  border:4px solid #cc0066;
  border-radius: 8px;
  font-family:'Press Start 2P';
  font-size: 10px;
  cursor:pointer;
  margin-top:10px;
  box-shadow: 6px 6px 0 #800060;
}

.save{background:#ff4d94;color:#fff;}
.back{background:#800060;color:#fff;}

/* Girly Background Palettes */
.bg-sakura{background:linear-gradient(135deg,#ffdde1,#ee9ca7);}
.bg-dreamy{background:repeating-linear-gradient(-45deg,#ffe6f2,#fff 10px,#ffe6f2 20px);}
.bg-midnight{background:#2a012a;color:#fff;} /* Very dark purple */
.bg-teal-dream{background:linear-gradient(135deg,#d4fc79,#96e6a1);}
.bg-strawberry{background:#fff; background-image: radial-gradient(#ffb3b3 15%, transparent 16%); background-size: 15px 15px;}
.bg-sunrise{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.bg-galaxy{background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;}
.bg-cloud-nine{background:linear-gradient(135deg,#fff,#ffe6f2);}
.bg-magenta-pop{background:repeating-linear-gradient(0deg,#fff,#fff 2px,#ff1493 3px,#fff 6px);}
.bg-peachy{background:linear-gradient(135deg,#f6d365,#fda085);}
</style>
</head>

<body>

<div class="header">PIXEL NOTE ✦</div>
<div class="sub">✨ write with retro girly style ✨</div>

<div class="container" id="entries"></div>

<button class="fab" onclick="openWrite()">+</button>

<!-- WRITE SCREEN -->
<div class="write" id="write">

  <input id="title" placeholder="title...">

  <textarea id="text" placeholder="write your note..."></textarea>

  <!-- BACKGROUNDS (Girlified Names) -->
  <div class="options">
    <div class="opt" onclick="setBG('bg-sakura')">sakura</div>
    <div class="opt" onclick="setBG('bg-dreamy')">dreamy</div>
    <div class="opt" onclick="setBG('bg-midnight')">night</div>
    <div class="opt" onclick="setBG('bg-teal-dream')">teal-dream</div>
    <div class="opt" onclick="setBG('bg-strawberry')">berry-dot</div>
    <div class="opt" onclick="setBG('bg-sunrise')">sunny</div>
    <div class="opt" onclick="setBG('bg-galaxy')">galaxy</div>
    <div class="opt" onclick="setBG('bg-cloud-nine')">cloud9</div>
    <div class="opt" onclick="setBG('bg-magenta-pop')">pop</div>
    <div class="opt" onclick="setBG('bg-peachy')">peachy</div>
  </div>

  <!-- TEXT COLORS (Girlified Palette) -->
  <div class="options">
    <div class="opt" onclick="setColor('#000')">black</div>
    <div class="opt" onclick="setColor('#ff2e93')">pink</div>
    <div class="opt" onclick="setColor('#6a0dad')">purple</div>
    <div class="opt" onclick="setColor('#ff0000')">red</div>
    <div class="opt" onclick="setColor('#e68a00')">gold</div>
    <div class="opt" onclick="setColor('#0099ff')">blue</div>
  </div>

  <button class="btn save" onclick="save()">SAVE NOTE</button>
  <button class="btn back" onclick="closeWrite()">BACK</button>

</div>

<script>

let bgClass="bg-sakura";
let textColor="#000";

function setBG(b){
  bgClass=b;
  document.getElementById("write").className="write "+b;
}

function setColor(c){
  textColor=c;
}

function openWrite(){
  document.getElementById("write").style.display="flex";
}

function closeWrite(){
  document.getElementById("write").style.display="none";
}

/* NOTES */
const container=document.getElementById("entries");

function save(){

  const title=document.getElementById("title").value;
  const text=document.getElementById("text").value;

  if(!title && !text) return;

  const card=document.createElement("div");
  card.className="card "+bgClass;
  card.style.color=textColor;

  card.innerHTML=`
    <div class="title">${title}</div>
    <div class="text">${text}</div>
  `;

  container.prepend(card);

  document.getElementById("title").value="";
  document.getElementById("text").value="";

  closeWrite();
}

</script>

</body>
</html>
