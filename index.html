<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Note ✦</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  font-family:'Press Start 2P', cursive;
  background:linear-gradient(#ffd1e8,#ffc2df);
}

.header{
  text-align:center;
  padding:18px;
  font-size:14px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
}

.sub{
  text-align:center;
  font-size:8px;
  margin-top:5px;
}

.container{
  width:90%;
  max-width:520px;
  margin:auto;
  padding-bottom:100px;
}

/* CARD */
.card{
  background:#fff;
  border:4px solid #000;
  padding:12px;
  margin-top:15px;
  box-shadow:5px 5px 0 #000;
}

.date{font-size:8px;color:#ff2e93;margin-bottom:6px;}
.mood{font-size:16px;margin-bottom:6px;}
.text{font-size:9px;white-space:pre-wrap;}
img{width:100%;border:3px solid #000;margin-top:6px;}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border:3px solid #000;
  background:#ff2e93;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

/* WRITE SCREEN */
.write{
  position:fixed;
  inset:0;
  background:#ffd1e8;
  display:none;
  flex-direction:column;
  padding:15px;
}

textarea{
  width:100%;
  height:60vh;
  border:4px solid #000;
  padding:12px;
  font-family:'Press Start 2P';
  font-size:9px;
  resize:none;
}

input{
  margin-top:10px;
  border:3px solid #000;
  padding:8px;
  font-size:8px;
}

.btn{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:3px solid #000;
  font-family:'Press Start 2P';
  cursor:pointer;
}

.save{background:#ff2e93;color:#fff;}
.back{background:#000;color:#fff;}
</style>
</head>

<body>

<div class="header">PIXEL NOTE ✦</div>
<div class="sub">retro writing system</div>

<div class="container" id="entries"></div>

<button class="fab" onclick="openWrite()">+</button>

<!-- WRITE SCREEN -->
<div class="write" id="write">

  <textarea id="text" placeholder="write everything here..."></textarea>

  <input type="file" id="image" accept="image/*"/>

  <button class="btn save" onclick="save()">SAVE NOTE</button>
  <button class="btn back" onclick="closeWrite()">BACK</button>

</div>

<script>
const container = document.getElementById("entries");

/* EXAMPLES */
const examples = [
{mood:"🌸",date:"May 23",text:"soft day... everything felt slow and peaceful"},
{mood:"✨",date:"May 20",text:"stars in my mind tonight"},
{mood:"🐱",date:"May 18",text:"a cat followed me home ♡"}
];

examples.forEach(e=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="date">${e.date}</div>
    <div class="mood">${e.mood}</div>
    <div class="text">${e.text}</div>
  `;
  container.appendChild(card);
});

function openWrite(){
  document.getElementById("write").style.display="flex";
}

function closeWrite(){
  document.getElementById("write").style.display="none";
}

function save(){
  const text=document.getElementById("text").value;
  const file=document.getElementById("image").files[0];

  if(!text && !file) return;

  const card=document.createElement("div");
  card.className="card";

  const date=new Date().toDateString();

  let img="";
  if(file){
    img=`<img src="${URL.createObjectURL(file)}">`;
  }

  card.innerHTML=`
    <div class="date">${date}</div>
    <div class="mood">✨</div>
    <div class="text">${text}</div>
    ${img}
  `;

  container.prepend(card);

  document.getElementById("text").value="";
  document.getElementById("image").value="";

  closeWrite();
}
</script>

</body>
</html>
