<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Note ✦</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  font-family:'Press Start 2P', cursive;
  background:linear-gradient(#ffd1e8,#ffc2df);
}

.header{
  text-align:center;
  padding:18px;
  font-size:14px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
}

.sub{
  text-align:center;
  font-size:8px;
  margin-top:5px;
}

.container{
  width:90%;
  max-width:520px;
  margin:auto;
  padding-bottom:100px;
}

.card{
  border:4px solid #000;
  padding:12px;
  margin-top:15px;
  box-shadow:5px 5px 0 #000;
}

.date{font-size:8px;margin-bottom:6px;}
.title{font-size:10px;margin-bottom:6px;}
.mood{font-size:16px;margin-bottom:6px;}
.text{font-size:9px;white-space:pre-wrap;}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border:3px solid #000;
  background:#ff2e93;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

.write{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:15px;
}

input, textarea{
  width:100%;
  border:4px solid #000;
  padding:10px;
  font-family:'Press Start 2P';
  font-size:9px;
  margin-bottom:10px;
}

textarea{
  height:45vh;
  resize:none;
}

.options{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}

.opt{
  border:3px solid #000;
  padding:6px;
  font-size:7px;
  cursor:pointer;
  background:#fff;
}

.btn{
  width:100%;
  padding:12px;
  border:3px solid #000;
  font-family:'Press Start 2P';
  cursor:pointer;
  margin-top:6px;
}

.save{background:#ff2e93;color:#fff;}
.back{background:#000;color:#fff;}
</style>
</head>

<body>

<div class="header">PIXEL NOTE ✦</div>
<div class="sub">10 themes system</div>

<div class="container" id="entries"></div>

<button class="fab" onclick="openWrite()">+</button>

<div class="write" id="write">

  <input id="title" placeholder="title...">
  <textarea id="text" placeholder="write your note..."></textarea>

  <!-- 10 THEMES -->
  <div class="options">

    <div class="opt" onclick="setTheme('#fff','#000')">white</div>
    <div class="opt" onclick="setTheme('#ffe6f2','#000')">pink</div>
    <div class="opt" onclick="setTheme('#dff6ff','#000')">blue</div>
    <div class="opt" onclick="setTheme('#e7ffe7','#000')">green</div>
    <div class="opt" onclick="setTheme('#1a1a1a','#fff')">dark</div>

    <div class="opt" onclick="setTheme('#fff7d6','#000')">sun</div>
    <div class="opt" onclick="setTheme('#f0e6ff','#000')">lav</div>
    <div class="opt" onclick="setTheme('#ffe0cc','#000')">peach</div>
    <div class="opt" onclick="setTheme('#e0f7ff','#000')">ice</div>
    <div class="opt" onclick="setTheme('#f2f2f2','#000')">gray</div>

  </div>

  <button class="btn save" onclick="save()">SAVE NOTE</button>
  <button class="btn back" onclick="closeWrite()">BACK</button>

</div>

<script>

let bg="#fff";
let color="#000";

function setTheme(b,c){
  bg=b;
  color=c;
  document.getElementById("write").style.background=b;
}

function openWrite(){
  document.getElementById("write").style.display="flex";
  document.getElementById("write").style.background="#ffd1e8";
}

function closeWrite(){
  document.getElementById("write").style.display="none";
}

const container=document.getElementById("entries");

/* EXAMPLES */
const examples=[
{title:"soft morning",mood:"🌸",text:"everything felt peaceful today"},
{title:"night sky",mood:"✨",text:"stars were whispering quietly"},
{title:"tiny joy",mood:"🐱",text:"a cat looked at me and I felt happy"}
];

examples.forEach(e=>{
  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <div class="title">${e.title}</div>
    <div class="mood">${e.mood}</div>
    <div class="text">${e.text}</div>
  `;

  container.appendChild(card);
});

function save(){
  const title=document.getElementById("title").value;
  const text=document.getElementById("text").value;

  if(!title && !text) return;

  const card=document.createElement("div");
  card.className="card";

  card.style.background=bg;
  card.style.color=color;

  card.innerHTML=`
    <div class="title">${title}</div>
    <div class="mood">✨</div>
    <div class="text">${text}</div>
  `;

  container.prepend(card);

  document.getElementById("title").value="";
  document.getElementById("text").value="";

  closeWrite();
}

</script>

</body>
</html>
