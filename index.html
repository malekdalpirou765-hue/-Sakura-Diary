<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Diary Deluxe</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(135deg,#ffd1e8,#ffc2df,#fff0f7);
  font-family:'Press Start 2P', cursive;
  color:#000;
}

/* HEADER */
.header{
  text-align:center;
  padding:18px;
  font-size:14px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:18px;
  right:18px;
  width:64px;
  height:64px;
  border:3px solid #000;
  background:#ff2e93;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:5px 5px 0 #000;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  width:92%;
  max-width:420px;
  background:#fff;
  border:4px solid #000;
  padding:15px;
  box-shadow:8px 8px 0 #000;
}

textarea{
  width:100%;
  height:120px;
  border:3px solid #000;
  padding:10px;
  font-family:'Press Start 2P';
  font-size:8px;
  margin-bottom:10px;
  resize:none;
}

/* EMOJI BAR */
.emojis{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.emoji{
  border:2px solid #000;
  padding:6px;
  cursor:pointer;
  background:#ffd1e8;
  font-size:14px;
}

/* INPUT */
input[type="file"]{
  width:100%;
  border:3px solid #000;
  padding:6px;
  font-size:8px;
  margin-bottom:10px;
  background:#fff;
}

button{
  width:100%;
  padding:10px;
  background:#ff2e93;
  border:3px solid #000;
  color:#fff;
  font-family:'Press Start 2P';
  cursor:pointer;
  margin-top:6px;
}

/* ENTRIES */
.container{
  width:92%;
  max-width:520px;
  margin:auto;
  padding-bottom:120px;
}

  border:4px solid #000;
