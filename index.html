<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sakura Diary</title>

  <style>
    body{
      margin:0;
      background:linear-gradient(#ffd6ec,#ffc2df);
      font-family:cursive;
      color:white;
      text-align:center;
      overflow-x:hidden;
    }

    .card{
      background:#fff0f7;
      color:#c94f8f;
      width:300px;
      margin:40px auto;
      padding:25px;
      border-radius:25px;
      border:3px solid white;
      box-shadow:0 6px 18px rgba(255,105,180,0.3);
    }

    h1{
      font-size:50px;
      margin-top:40px;
      text-shadow:0 0 10px white;
    }

    button{
      background:linear-gradient(#ffb6d9,#ff69b4);
      border:none;
      color:white;
      padding:12px 25px;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
    }

    .sparkle{
      position:absolute;
      animation:float 3s infinite ease-in-out;
      color:white;
    }

    @keyframes float{
      50%{transform:translateY(-10px);}
    }
  </style>
</head>

<body>

<div class="sparkle" style="top:20px;left:30px;">✦</div>
<div class="sparkle" style="top:100px;right:50px;">♡</div>
<div class="sparkle" style="bottom:40px;left:70px;">🎀</div>

<h1>🌸 Sakura Diary 🌸</h1>

<div class="card">
  <h2>Dear diary...</h2>

  <p>
    Today felt soft and magical ✨
  </p>

  <button>New Entry ♡</button>
</div>

</body>
</html>
