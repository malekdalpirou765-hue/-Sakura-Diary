<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Diary ++</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#ffd1e8;
  font-family:'Press Start 2P', cursive;
  color:#000;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  font-size:14px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border:3px solid #000;
  background:#ff2e93;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  width:90%;
  max-width:400px;
  background:#fff;
  border:4px solid #000;
  padding:15px;
}

textarea{
  width:100%;
  height:120px;
  border:3px solid #000;
  padding:10px;
  font-family:'Press Start 2P';
  font-size:8px;
  margin-bottom:10px;
}

input{
  width:100%;
  border:3px solid #000;
  padding:8px;
  font-family:'Press Start 2P';
  font-size:8px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  background:#ff2e93;
  border:3px solid #000;
  color:#fff;
  font-family:'Press Start 2P';
  cursor:pointer;
}

/* ENTRIES */
.container{
  width:90%;
  max-width:500px;
  margin:auto;
  padding-bottom:100px;
}

.card{
  background:#fff;
  border:4px solid #000;
  padding:10px;
  margin-top:15px;
  box-shadow:5px 5px 0 #000;
}

.date{
  font-size:8px;
  color:#ff2e93;
  margin-bottom:6px;
}

.text{
  font-size:9px;
  margin-bottom:10px;
  white-space:pre-wrap;
}

img{
  width:100%;
  border:3px solid #000;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="header">PIXEL DIARY ♡</div>

<div class="container" id="entries"></div>

<!-- FLOAT BUTTON -->
<button class="fab" onclick="openPopup()">+</button>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">

    <textarea id="text" placeholder="write your memory..."></textarea>

    <input type="file" id="image" accept="image/*"/>

    <button onclick="addEntry()">SAVE ENTRY</button>
    <button onclick="closePopup()" style="margin-top:8px;background:#000;">CANCEL</button>

  </div>
</div>

<script>
function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function addEntry(){
  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  if(!text.trim() && !file) return;

  const container = document.getElementById("entries");

  const card = document.createElement("div");
  card.className = "card";

  const now = new Date();
  const date = now.toDateString();

  let imgHTML = "";

  if(file){
    const url = URL.createObjectURL(file);
    imgHTML = `<img src="${url}" />`;
  }

  card.innerHTML = `
    <div class="date">${date}</div>
    <div class="text">${text}</div>
    ${imgHTML}
  `;

  container.prepend(card);

  document.getElementById("text").value = "";
  document.getElementById("image").value = "";

  closePopup();
}
</script>

</body>
</html>
