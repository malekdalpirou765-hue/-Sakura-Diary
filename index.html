<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Sakura Diary</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#ffd1e8;
  font-family:'Press Start 2P', cursive;
  color:#3b1b2b;
  image-rendering: pixelated;
  overflow-x:hidden;
}

/* pixel stars */
.pixel{
  position:absolute;
  font-size:14px;
  color:#fff;
  text-shadow:2px 2px 0 #000;
}

.container{
  width:90%;
  max-width:500px;
  margin:auto;
  padding:30px 0;
}

.title{
  text-align:center;
  font-size:18px;
  color:#ff2e93;
  text-shadow:3px 3px 0 #000;
  margin-bottom:20px;
}

.card{
  background:#fff;
  border:4px solid #000;
  padding:15px;
  margin-bottom:20px;
  box-shadow:6px 6px 0 #000;
}

.date{
  font-size:10px;
  margin-bottom:10px;
  color:#ff2e93;
}

.card-title{
  font-size:12px;
  margin-bottom:10px;
  color:#000;
}

.text{
  font-size:10px;
  line-height:1.6;
}

.button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#ff2e93;
  border:3px solid #000;
  color:white;
  font-family:'Press Start 2P';
  font-size:10px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

.button:active{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 #000;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.badge{
  display:inline-block;
  padding:5px;
  background:#fff;
  border:3px solid #000;
  font-size:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="pixel" style="top:20px;left:20px;">✦</div>
<div class="pixel" style="top:60px;right:30px;">♡</div>
<div class="pixel" style="bottom:40px;left:50px;">★</div>

<div class="container">

  <div class="header">
    <div class="title">SAKURA DIARY</div>
    <div class="badge">PIXEL MODE ON</div>
  </div>

  <div class="card">
    <div class="date">MAY 23</div>
    <div class="card-title">soft memory</div>
    <div class="text">
      today felt like a retro game level ✦<br><br>
      everything was simple and pink and quiet
    </div>
    <button class="button">NEW ENTRY</button>
  </div>

  <div class="card">
    <div class="date">MAY 20</div>
    <div class="card-title">night sky</div>
    <div class="text">
      the stars looked like pixels in the sky ✨
    </div>
  </div>

</div>

</body>
</html>
