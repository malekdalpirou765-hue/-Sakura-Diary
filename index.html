<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Note ✦</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Press Start 2P', cursive;
  overflow-x:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:18px;
  font-size:14px;
  color:#ff2e93;
  text-shadow:2px 2px 0 #000;
}

.sub{
  text-align:center;
  font-size:8px;
  margin-bottom:10px;
}

/* CONTAINER */
.container{
  width:92%;
  max-width:520px;
  margin:auto;
  padding-bottom:100px;
}

/* CARD */
.card{
  border:4px solid #000;
  padding:12px;
  margin-top:15px;
  box-shadow:5px 5px 0 #000;
  position:relative;
  overflow:hidden;
  background:#fff;
}

.title{font-size:10px;margin-bottom:6px;}
.text{font-size:9px;white-space:pre-wrap;line-height:1.5;}
.mood{font-size:16px;margin-bottom:6px;}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border:3px solid #000;
  background:#ff2e93;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
}

/* WRITE SCREEN */
.write{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:12px;
  overflow:hidden;
  background:#ffd1e8;
}

input, textarea{
  width:100%;
  border:4px solid #000;
  padding:10px;
  font-family:'Press Start 2P';
  font-size:9px;
  margin-bottom:8px;
}

textarea{
  height:50vh;
  resize:none;
}

/* OPTIONS */
.options{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:8px;
}

.opt{
  border:3px solid #000;
  padding:6px;
  font-size:7px;
  cursor:pointer;
  background:#fff;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  border:3px solid #000;
  font-family:'Press Start 2P';
  cursor:pointer;
  margin-top:6px;
}

.save{background:#ff2e93;color:#fff;}
.back{background:#000;color:#fff;}

/* ===================== */
/* 🎨 REAL PATTERN BACKGROUNDS */
/* ===================== */

.bg1{
  background:
  radial-gradient(circle at 10px 10px,#ff2e93 2px,transparent 3px),
  radial-gradient(circle at 30px 30px,#ffb6d5 2px,transparent 3px);
  background-size:40px 40px;
}

.bg2{
  background:
  linear-gradient(45deg,#000 1px,transparent 1px),
  linear-gradient(-45deg,#ff2e93 1px,transparent 1px);
  background-size:20px 20px;
}

.bg3{
  background:
  radial-gradient(circle,#000 2px,transparent 3px);
  background-size:18px 18px;
}

.bg4{
  background:
  repeating-linear-gradient(90deg,#aef,#aef 5px,#fff 5px,#fff 10px);
}

.bg5{
  background:
  linear-gradient(45deg,#ff2e93 25%,transparent 25%),
  linear-gradient(-45deg,#ff2e93 25%,transparent 25%),
  linear-gradient(45deg,transparent 75%,#ffb6d5 75%),
  linear-gradient(-45deg,transparent 75%,#ffb6d5 75%);
  background-size:20px 20px;
}

.bg6{
  background:
  radial-gradient(circle,#ff2e93 3px,transparent 4px),
  radial-gradient(circle,#000 2px,transparent 3px);
  background-size:25px 25px;
}

.bg7{
  background:
  repeating-conic-gradient(#ff2e93 0% 25%,#fff 0% 50%);
}

.bg8{
  background:
  linear-gradient(90deg,#fff 50%,#ffe6f2 50%);
  background-size:10px 100%;
}

.bg9{
  background:
  radial-gradient(circle at 20px 20px,#000 2px,transparent 3px),
  radial-gradient(circle at 40px 40px,#ff2e93 2px,transparent 3px);
  background-size:50px 50px;
}

.bg10{
  background:
  linear-gradient(0deg,#ff2e93 2px,transparent 2px),
  linear-gradient(90deg,#ff2e93 2px,transparent 2px);
  background-size:20px 20px;
}
</style>
</head>

<body>

<div class="header">PIXEL NOTE ✦</div>
<div class="sub">real pattern backgrounds + colors</div>

<div class="container" id="entries"></div>

<button class="fab" onclick="openWrite()">+</button>

<!-- WRITE -->
<div class="write" id="write">

  <input id="title" placeholder="title...">
  <textarea id="text" placeholder="write your note..."></textarea>

  <!-- BACKGROUNDS -->
  <div class="options">
    <div class="opt" onclick="setBG('bg1')">dots</div>
    <div class="opt" onclick="setBG('bg2')">cross</div>
    <div class="opt" onclick="setBG('bg3')">pixels</div>
    <div class="opt" onclick="setBG('bg4')">stripes</div>
    <div class="opt" onclick="setBG('bg5')">check</div>
    <div class="opt" onclick="setBG('bg6')">spark</div>
    <div class="opt" onclick="setBG('bg7')">wave</div>
    <div class="opt" onclick="setBG('bg8')">split</div>
    <div class="opt" onclick="setBG('bg9')">noise</div>
    <div class="opt" onclick="setBG('bg10')">grid</div>
  </div>

  <!-- COLORS -->
  <div class="options">
    <div class="opt" onclick="setColor('#000')">black</div>
    <div class="opt" onclick="setColor('#ff2e93')">pink</div>
    <div class="opt" onclick="setColor('#1e90ff')">blue</div>
    <div class="opt" onclick="setColor('#00a86b')">green</div>
    <div class="opt" onclick="setColor('#6a0dad')">purple</div>
  </div>

  <button class="btn save" onclick="save()">SAVE NOTE</button>
  <button class="btn back" onclick="closeWrite()">BACK</button>

</div>

<script>

let bgClass="bg1";
let textColor="#000";

function setBG(b){
  bgClass=b;
}

function setColor(c){
  textColor=c;
}

function openWrite(){
  document.getElementById("write").style.display="flex";
}

function closeWrite(){
  document.getElementById("write").style.display="none";
}

const container=document.getElementById("entries");

/* SAVE */
function save(){
  const title=document.getElementById("title").value;
  const text=document.getElementById("text").value;

  if(!title && !text) return;

  const card=document.createElement("div");
  card.className="card "+bgClass;
  card.style.color=textColor;

  card.innerHTML=`
    <div class="title">${title}</div>
    <div class="text">${text}</div>
  `;

  container.prepend(card);

  document.getElementById("title").value="";
  document.getElementById("text").value="";

  closeWrite();
}
</script>

</body>
</html>
